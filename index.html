<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="UNO نقاط"/>
<meta name="theme-color" content="#FF4655"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.svg"/>
<title>UNO نقاط</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0d0d1a;color:#fff;font-family:'Segoe UI',Tahoma,sans-serif;direction:rtl;overscroll-behavior:none;min-height:100vh}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
</style>
</head>
<body>
<div id="app"><div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.3);font-size:14px">جاري التحميل...</div></div>
<script>
if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');

const COLORS=["#FF4655","#00C9FF","#F5C400","#00E676","#FF6D00","#B388FF","#FF80AB"];
const CREW=["أبوشناف","الجطلاوي","ابشير","زقوط","الصادي","تيبار"];
const CARDS=[{l:"0",v:0},{l:"1",v:1},{l:"2",v:2},{l:"3",v:3},{l:"4",v:4},{l:"5",v:5},{l:"6",v:6},{l:"7",v:7},{l:"8",v:8},{l:"9",v:9},{l:"عكس",v:10},{l:"تخطي",v:10},{l:"رسم",v:10},{l:"+2",v:10},{l:"ملون",v:10},{l:"+4",v:25}];
const KEY="uno-v4";
const WARM=["😌","😏","🫠","😅","🌝","🫣"];

function rankLabel(rank,total){
  if(rank===0)return{e:"🏆",t:"البطل",c:"#F5C400",bg:"rgba(245,196,0,0.1)"};
  if(rank===total-1)return{e:"💀",t:"العكرة",c:"#FF4655",bg:"rgba(255,70,85,0.1)"};
  if(rank===total-2&&total>2)return{e:"🤦",t:"مساعد العكرة",c:"#FF6D00",bg:"rgba(255,109,0,0.08)"};
  return{e:WARM[(rank-1)%WARM.length],t:"المنطقة الدافئة 🌡️",c:"#60CDCD",bg:"rgba(96,205,205,0.07)"};
}
const totalOf=p=>p.scores.reduce((a,b)=>a+b,0);
const arabicSort=(a,b)=>a.name.localeCompare(b.name,"ar");
function save(s){try{localStorage.setItem(KEY,JSON.stringify(s));}catch(e){}}
function load(){try{const v=localStorage.getItem(KEY);return v?JSON.parse(v):null;}catch(e){return null;}}
function clear(){try{localStorage.removeItem(KEY);}catch(e){}}

let state={screen:"setup",crew:CREW.map((n,i)=>({id:i,name:n,selected:true,color:COLORS[i]})),players:[],round:1,inputs:{},confirmed:[],picker:null,tab:"game",savedGame:null,saveFlash:false,validErr:""};

function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on")&&typeof v==="function")el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="value"&&(tag==="input"||tag==="textarea"))el.value=v??"";
    else if(k==="disabled")el.disabled=v;
    else if(k==="placeholder")el.placeholder=v;
    else if(k==="type")el.type=v;
    else if(k==="min")el.min=v;
    else if(k==="autoFocus"&&v)setTimeout(()=>el.focus(),50);
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{if(c==null||c===false)return;el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);});
  return el;
}

function render(){
  const root=document.getElementById("app");
  root.innerHTML="";
  root.appendChild(state.screen==="setup"?renderSetup():renderGame());
}

function renderSetup(){
  const{crew,savedGame}=state;
  const sel=crew.filter(p=>p.selected);
  const canStart=sel.length>=2;
  const wrap=h("div",{style:{minHeight:"100vh",background:"#0d0d1a",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"20px 16px"}});

  // Logo
  const logo=h("div",{style:{marginBottom:"22px",textAlign:"center"}},
    h("div",{style:{width:"68px",height:"94px",borderRadius:"14px",margin:"0 auto 12px",background:"linear-gradient(145deg,#FF4655,#c62030)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"900",fontSize:"24px",color:"#fff",boxShadow:"0 8px 32px #FF465560",border:"3px solid rgba(255,255,255,0.15)",position:"relative"}},
      "UNO",h("div",{style:{position:"absolute",width:"24px",height:"36px",borderRadius:"6px",background:"rgba(255,255,255,0.1)",border:"2px solid rgba(255,255,255,0.2)",top:"-5px",left:"-5px"}})
    ),
    h("div",{style:{fontSize:"20px",fontWeight:"800"}},"حاسبة النقاط"),
    h("div",{style:{fontSize:"11px",color:"rgba(255,255,255,0.3)",marginTop:"3px"}},"من البطل للعكرة 🃏")
  );
  wrap.appendChild(logo);

  if(savedGame){
    wrap.appendChild(h("div",{style:{width:"100%",maxWidth:"420px",background:"rgba(245,196,0,0.08)",border:"1px solid rgba(245,196,0,0.3)",borderRadius:"14px",padding:"13px 16px",marginBottom:"14px"}},
      h("div",{style:{fontSize:"11px",color:"#F5C400",fontWeight:"700",marginBottom:"5px"}},`🕐 لعبة محفوظة — جولة ${savedGame.round}`),
      h("div",{style:{fontSize:"12px",color:"rgba(255,255,255,0.65)",marginBottom:"10px"}},savedGame.players.filter(p=>p.active).map(p=>p.name).join("، ")),
      h("div",{style:{display:"flex",gap:"8px"}},
        h("button",{style:{flex:"2",padding:"8px",borderRadius:"9px",border:"none",background:"#F5C400",color:"#0d0d1a",fontWeight:"800",fontSize:"13px"},onClick:()=>{state.players=savedGame.players;state.round=savedGame.round;state.inputs={};state.confirmed=[];state.tab="game";state.screen="game";render();}}, "↩ استكمال"),
        h("button",{style:{flex:"1",padding:"8px",borderRadius:"9px",border:"1px solid rgba(255,70,85,0.3)",background:"rgba(255,70,85,0.1)",color:"#FF4655",fontWeight:"700",fontSize:"12px"},onClick:()=>{clear();state.savedGame=null;render();}},"حذف")
      )
    ));
  }

  const listBox=h("div",{style:{width:"100%",maxWidth:"420px",background:"rgba(255,255,255,0.04)",borderRadius:"16px",padding:"16px",marginBottom:"12px",border:"1px solid rgba(255,255,255,0.08)"}});
  listBox.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}},
    h("div",{style:{fontSize:"12px",color:"rgba(255,255,255,0.4)",fontWeight:"700"}},"اختر اللاعبين"),
    h("div",{style:{fontSize:"11px",color:canStart?"#00E676":"#FF4655",fontWeight:"700"}},`${sel.length} محددين ${sel.length<2?"(2 على الأقل)":"✓"}`)
  ));

  crew.forEach((p,idx)=>{
    const row=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"7px"}});
    row.appendChild(h("button",{style:{width:"28px",height:"28px",borderRadius:"7px",border:`2px solid ${p.selected?p.color:"rgba(255,255,255,0.15)"}`,background:p.selected?`${p.color}25`:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:"0",fontSize:"14px",color:"#fff"},onClick:()=>{state.crew=state.crew.map(c=>c.id===p.id?{...c,selected:!c.selected}:c);render();}},p.selected?"✓":""));
    row.appendChild(h("div",{style:{width:"8px",height:"8px",borderRadius:"50%",background:p.color,flexShrink:"0",opacity:p.selected?"1":"0.3"}}));
    row.appendChild(h("span",{style:{flex:"1",fontSize:"14px",fontWeight:p.selected?"700":"400",color:p.selected?"#fff":"rgba(255,255,255,0.3)",cursor:"pointer"},onClick:()=>{const n=prompt("تعديل الاسم:",p.name);if(n&&n.trim())state.crew=state.crew.map(c=>c.id===p.id?{...c,name:n.trim()}:c);render();}},p.name," ",h("span",{style:{fontSize:"9px",opacity:"0.3"}},"✏️")));
    if(idx>=CREW.length)row.appendChild(h("button",{style:{width:"26px",height:"26px",borderRadius:"6px",border:"1px solid rgba(255,70,85,0.25)",background:"rgba(255,70,85,0.1)",color:"#FF4655",fontSize:"13px"},onClick:()=>{state.crew=state.crew.filter(c=>c.id!==p.id);render();}},"✕"));
    listBox.appendChild(row);
  });

  let extraInp;
  listBox.appendChild(h("div",{style:{display:"flex",gap:"7px",marginTop:"10px"}},
    extraInp=h("input",{type:"text",placeholder:"إضافة لاعب جديد...",style:{flex:"1",background:"rgba(255,255,255,0.06)",border:"1px dashed rgba(255,255,255,0.15)",borderRadius:"8px",padding:"7px 11px",color:"#fff",fontSize:"13px",outline:"none"}}),
    h("button",{style:{padding:"7px 13px",borderRadius:"8px",border:"none",background:"rgba(0,230,118,0.15)",color:"#00E676",fontWeight:"800",fontSize:"14px"},onClick:()=>{const n=extraInp.value.trim();if(!n)return;const uc=state.crew.map(c=>c.color);const col=COLORS.find(c=>!uc.includes(c))||COLORS[state.crew.length%COLORS.length];state.crew=[...state.crew,{id:Date.now(),name:n,selected:true,color:col}];render();}},"+")
  ));
  wrap.appendChild(listBox);

  wrap.appendChild(h("button",{style:{width:"100%",maxWidth:"420px",padding:"15px",borderRadius:"14px",border:"none",background:canStart?"linear-gradient(135deg,#FF4655,#c62030)":"rgba(255,255,255,0.06)",color:canStart?"#fff":"rgba(255,255,255,0.2)",fontSize:"16px",fontWeight:"800",boxShadow:canStart?"0 6px 24px #FF465550":"none"},disabled:!canStart,onClick:()=>{
    const s=state.crew.filter(p=>p.selected);
    clear();
    state.players=s.map((p,i)=>({id:p.id,name:p.name,color:COLORS[i%COLORS.length],scores:[],active:true,joinedAtRound:1}));
    state.round=1;state.inputs={};state.confirmed=[];state.tab="game";state.screen="game";render();
  }},savedGame?"بدء لعبة جديدة 🎮":"ابدأ اللعبة 🎮"));
  return wrap;
}

function renderGame(){
  const{players,round,inputs,confirmed,picker,tab,saveFlash,validErr}=state;
  const active=players.filter(p=>p.active);
  const byScore=[...active].sort((a,b)=>totalOf(a)-totalOf(b));
  const byAlpha=[...active].sort(arabicSort);
  const wrap=h("div",{style:{minHeight:"100vh",background:"#0d0d1a",paddingBottom:"50px"}});

  wrap.appendChild(h("div",{style:{background:"rgba(255,255,255,0.04)",borderBottom:"1px solid rgba(255,255,255,0.07)",padding:"11px 15px",display:"flex",alignItems:"center",justifyContent:"space-between"}},
    h("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},
      h("div",{style:{width:"25px",height:"36px",borderRadius:"6px",background:"linear-gradient(145deg,#FF4655,#c62030)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"900",fontSize:"8px",color:"#fff",border:"2px solid rgba(255,255,255,0.2)"}},"UNO"),
      h("span",{style:{fontWeight:"800",fontSize:"15px"}},"حاسبة النقاط")
    ),
    h("div",{style:{display:"flex",gap:"6px",alignItems:"center"}},
      h("span",{style:{fontSize:"10px",color:saveFlash?"#00E676":"rgba(255,255,255,0.18)",fontWeight:"700"}},saveFlash?"✓ محفوظ":"💾"),
      h("div",{style:{background:"rgba(255,255,255,0.08)",borderRadius:"20px",padding:"3px 11px",fontSize:"12px",fontWeight:"700"}},`جولة ${round}`),
      h("button",{style:{background:"none",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"8px",color:"rgba(255,255,255,0.3)",padding:"3px 8px",fontSize:"11px"},onClick:()=>{if(confirm("مسح اللعبة؟ سيتم حذف جميع النقاط نهائياً")){clear();state.screen="setup";state.savedGame=null;render();}}},"جديدة")
    )
  ));

  const inner=h("div",{style:{maxWidth:"520px",margin:"0 auto",padding:"0 12px"}});
  const tabs=h("div",{style:{display:"flex",marginTop:"12px",marginBottom:"13px",background:"rgba(255,255,255,0.05)",borderRadius:"10px",padding:"3px"}});
  [["game","🎮 اللعبة"],["board","🏅 الترتيب"],["history","📋 السجل"]].forEach(([v,l])=>{
    tabs.appendChild(h("button",{style:{flex:"1",padding:"8px 0",borderRadius:"8px",border:"none",background:tab===v?"rgba(255,255,255,0.11)":"transparent",color:tab===v?"#fff":"rgba(255,255,255,0.35)",fontWeight:"700",fontSize:"12px"},onClick:()=>{state.tab=v;render();}},l));
  });
  inner.appendChild(tabs);

  if(tab==="game"){
    const fc=active.filter(p=>confirmed.includes(p.id)).length;
    const pct=Math.round((fc/active.length)*100);
    inner.appendChild(h("div",{style:{marginBottom:"10px"}},
      h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"5px"}},
        h("span",{style:{fontSize:"11px",color:"rgba(255,255,255,0.35)",fontWeight:"700"}},`الجولة ${round}`),
        h("span",{style:{fontSize:"11px",fontWeight:"700",color:fc===active.length?"#00E676":"rgba(255,255,255,0.4)"}},`${fc}/${active.length} ✓`)
      ),
      h("div",{style:{height:"4px",background:"rgba(255,255,255,0.07)",borderRadius:"4px",overflow:"hidden"}},
        h("div",{style:{height:"100%",width:`${pct}%`,background:fc===active.length?"#00E676":"#FF4655",borderRadius:"4px"}})
      )
    ));

    byAlpha.forEach(p=>{
      const iv=inputs[p.id];
      const locked=confirmed.includes(p.id);
      const open=picker===p.id&&!locked;
      const nv=parseInt(iv);
      const zero=locked&&nv===0;
      const confirmE=()=>{if(iv===undefined||iv==="")return;state.confirmed=[...state.confirmed,p.id];state.picker=null;doSave();render();};
      const unlockE=()=>{state.confirmed=state.confirmed.filter(id=>id!==p.id);render();};

      const card=h("div",{style:{border:`1px solid ${locked?(zero?"#00E67640":p.color+"50"):p.color+"26"}`,borderRight:`4px solid ${locked?(zero?"#00E676":p.color):p.color+"60"}`,borderRadius:"13px",padding:"11px 13px",marginBottom:"8px",background:locked?(zero?"rgba(0,230,118,0.08)":"rgba(255,255,255,0.03)"):"rgba(255,255,255,0.05)",opacity:locked?"0.78":"1",transition:"all 0.2s"}});
      const top=h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:locked?"0":"8px"}});
      top.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"6px"}},
        h("span",{style:{fontSize:"16px"}},locked?(zero?"✅":"🔒"):"🎴"),
        h("div",{},
          h("div",{style:{fontWeight:"800",fontSize:"14px",cursor:"pointer",lineHeight:"1.2"},onClick:()=>{const n=prompt("تعديل الاسم:",p.name);if(n&&n.trim())state.players=state.players.map(pl=>pl.id===p.id?{...pl,name:n.trim()}:pl);render();}},p.name,p.joinedAtRound>1?h("span",{style:{fontSize:"9px",opacity:"0.35",marginRight:"3px"}},`+ج${p.joinedAtRound}`):""),
          locked?h("div",{style:{fontSize:"11px",color:zero?"#00E676":"rgba(255,255,255,0.4)",fontWeight:"700",marginTop:"1px"}},zero?"أنهى أوراقه 🎉":`${nv} نقطة مسجّلة`):""
        )
      ));
      const btns=h("div",{style:{display:"flex",alignItems:"center",gap:"6px"}});
      if(locked)btns.appendChild(h("button",{style:{padding:"4px 10px",borderRadius:"7px",background:"rgba(255,200,0,0.1)",border:"1px solid rgba(255,200,0,0.25)",color:"#F5C400",fontSize:"11px",fontWeight:"700"},onClick:unlockE},"تعديل ✏️"));
      btns.appendChild(h("button",{style:{width:"28px",height:"28px",borderRadius:"7px",background:"rgba(255,150,0,0.1)",border:"1px solid rgba(255,150,0,0.22)",color:"#FF9500",fontSize:"12px"},onClick:()=>{state.players=state.players.map(pl=>pl.id===p.id?{...pl,active:!pl.active}:pl);delete state.inputs[p.id];state.confirmed=state.confirmed.filter(id=>id!==p.id);render();}},"⏸"));
      top.appendChild(btns);
      card.appendChild(top);

      if(!locked){
        const row=h("div",{style:{display:"flex",gap:"6px",alignItems:"stretch"}});
        const inp=h("input",{type:"number",min:"0",placeholder:"0",value:iv??"",style:{flex:"1",minWidth:"0",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:"9px",padding:"0 8px",color:"#fff",fontSize:"20px",fontWeight:"800",textAlign:"center",outline:"none",direction:"ltr",height:"48px"}});
        inp.addEventListener("input",e=>{
          state.inputs={...state.inputs,[p.id]:e.target.value};
          // Update confirm button without full re-render
          const hasVal=e.target.value!=="";
          confBtn.style.background=hasVal?"linear-gradient(135deg,#00C853,#00E676)":"rgba(255,255,255,0.03)";
          confBtn.style.border=hasVal?"none":"1px dashed rgba(255,255,255,0.07)";
          confBtn.style.boxShadow=hasVal?"0 3px 12px rgba(0,230,118,0.35)":"none";
          confBtn.style.cursor=hasVal?"pointer":"default";
          if(hasVal){confBtn.innerHTML="✓";confBtn.onclick=confirmE;}
          else{confBtn.innerHTML="<span style='font-size:10px;color:rgba(255,255,255,0.18)'>✓</span>";confBtn.onclick=null;}
        });
        inp.addEventListener("keydown",e=>{if(e.key==="Enter")confirmE();});
        const cardBtn=h("button",{style:{width:"36px",height:"48px",borderRadius:"8px",background:open?`${p.color}28`:"rgba(255,255,255,0.06)",border:`1px solid ${open?p.color:"rgba(255,255,255,0.1)"}`,color:"#fff",fontSize:"16px",flexShrink:"0"},onClick:()=>{state.picker=state.picker===p.id?null:p.id;render();}},"🃏");
        const hasV=iv!==undefined&&iv!=="";
        let confBtn=hasV?h("button",{style:{flex:"1",minWidth:"0",height:"48px",borderRadius:"10px",background:"linear-gradient(135deg,#00C853,#00E676)",border:"none",color:"#0d0d1a",fontSize:"22px",fontWeight:"900",boxShadow:"0 3px 12px rgba(0,230,118,0.35)"},onClick:confirmE},"✓"):h("div",{style:{flex:"1",minWidth:"0",height:"48px",borderRadius:"10px",background:"rgba(255,255,255,0.03)",border:"1px dashed rgba(255,255,255,0.07)",display:"flex",alignItems:"center",justifyContent:"center"}},h("span",{style:{fontSize:"10px",color:"rgba(255,255,255,0.18)"}},"✓"));
        row.append(inp,cardBtn,confBtn);
        card.appendChild(row);
        if(open){
          const grid=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"5px",marginTop:"8px"}});
          CARDS.forEach(c=>{grid.appendChild(h("button",{style:{padding:"6px 3px",borderRadius:"7px",background:`${p.color}12`,border:`1px solid ${p.color}30`,color:"#fff",fontSize:"11px",fontWeight:"700",display:"flex",flexDirection:"column",alignItems:"center",gap:"1px"},onClick:()=>{const cur=parseInt(state.inputs[p.id]||0);state.inputs={...state.inputs,[p.id]:String(cur+c.v)};render();}},c.l,h("span",{style:{fontSize:"9px",color:p.color,fontWeight:"800"}},`+${c.v}`)));});
          card.appendChild(grid);
        }
      }
      inner.appendChild(card);
    });

    const paused=players.filter(p=>!p.active);
    if(paused.length){
      const ps=h("div",{style:{marginBottom:"9px"}},h("div",{style:{fontSize:"10px",color:"rgba(255,255,255,0.25)",marginBottom:"5px",fontWeight:"700"}},"⏸ موقوفون"));
      paused.forEach(p=>{ps.appendChild(h("div",{style:{display:"flex",alignItems:"center",gap:"9px",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:"9px",padding:"8px 12px",marginBottom:"5px",opacity:"0.55"}},h("div",{style:{width:"7px",height:"7px",borderRadius:"50%",background:p.color}}),h("span",{style:{flex:"1",fontWeight:"600",fontSize:"13px"}},p.name),h("span",{style:{fontSize:"15px",fontWeight:"800",color:p.color}},totalOf(p)),h("button",{style:{padding:"3px 9px",borderRadius:"6px",border:"1px solid rgba(0,230,118,0.25)",background:"rgba(0,230,118,0.08)",color:"#00E676",fontSize:"11px",fontWeight:"700"},onClick:()=>{state.players=state.players.map(pl=>pl.id===p.id?{...pl,active:true}:pl);render();}},"استئناف")));});
      inner.appendChild(ps);
    }

    inner.appendChild(h("button",{style:{width:"100%",padding:"9px",borderRadius:"9px",border:"1px dashed rgba(255,255,255,0.13)",background:"transparent",color:"rgba(255,255,255,0.3)",fontSize:"12px",marginBottom:"9px"},onClick:()=>{const n=prompt("اسم اللاعب الجديد:");if(!n||!n.trim())return;const uc=state.players.map(p=>p.color);const col=COLORS.find(c=>!uc.includes(c))||COLORS[state.players.length%COLORS.length];const sb=[...state.players.filter(p=>p.active)].sort((a,b)=>totalOf(a)-totalOf(b));const worst=sb.length>0?totalOf(sb[sb.length-1])+5:0;const pad=state.round>1?[worst,...Array(state.round-2).fill(0)]:[];state.players=[...state.players,{id:Date.now(),name:n.trim(),scores:pad,color:col,active:true,joinedAtRound:state.round}];render();}},"+ إضافة لاعب الآن"));

    if(validErr)inner.appendChild(h("div",{style:{background:"rgba(255,70,85,0.1)",border:"1px solid rgba(255,70,85,0.28)",borderRadius:"9px",padding:"9px 13px",marginBottom:"7px",fontSize:"12px",color:"#FF4655",fontWeight:"600",textAlign:"center"}},validErr));

    const allDone=active.every(p=>confirmed.includes(p.id));
    inner.appendChild(h("button",{style:{width:"100%",padding:"13px",borderRadius:"11px",border:"none",background:allDone?"linear-gradient(135deg,#FF4655,#c62030)":"rgba(255,255,255,0.06)",color:allDone?"#fff":"rgba(255,255,255,0.22)",fontSize:"14px",fontWeight:"800",boxShadow:allDone?"0 4px 18px #FF465530":"none",marginBottom:"6px"},disabled:!allDone,onClick:()=>{
      const vals=active.map(p=>parseInt(state.inputs[p.id]??"x"));
      const zeros=vals.filter(v=>v===0).length;
      if(!zeros){state.validErr="⚠️ يجب أن يكون هناك لاعب واحد بنتيجة 0 — من أنهى أوراقه";render();return;}
      if(zeros>1){state.validErr="⚠️ لاعب واحد فقط يمكنه إنهاء أوراقه في كل جولة";render();return;}
      state.validErr="";
      state.players=state.players.map(p=>!p.active?p:{...p,scores:[...p.scores,parseInt(state.inputs[p.id])||0]});
      state.inputs={};state.confirmed=[];state.picker=null;state.round++;
      doSave();render();
    }},allDone?`✓ تسجيل الجولة ${round}`:`أدخل نقاط جميع اللاعبين (${active.filter(p=>confirmed.includes(p.id)).length}/${active.length})`));

    if(round>1)inner.appendChild(h("button",{style:{width:"100%",padding:"9px",borderRadius:"10px",border:"1px solid rgba(255,255,255,0.08)",background:"transparent",color:"rgba(255,255,255,0.3)",fontSize:"12px"},onClick:()=>{state.players=state.players.map(p=>({...p,scores:p.scores.slice(0,-1)}));state.confirmed=[];state.round--;doSave();render();}},`↩ تراجع عن الجولة ${round-1}`));
  }

  if(tab==="board"){
    const max=Math.max(...active.map(totalOf))||1;
    byScore.forEach((p,rank)=>{
      const rl=rankLabel(rank,active.length);
      const total=totalOf(p);
      inner.appendChild(h("div",{style:{background:rl.bg,border:`1px solid ${p.color}26`,borderRadius:"13px",padding:"13px 15px",marginBottom:"8px",position:"relative",overflow:"hidden"}},
        h("div",{style:{position:"absolute",bottom:"0",right:"0",width:`${(total/max)*100}%`,height:"3px",background:`linear-gradient(90deg,transparent,${p.color})`}}),
        h("div",{style:{display:"flex",alignItems:"center",gap:"10px"}},
          h("div",{style:{fontSize:"26px"}},rl.e),
          h("div",{style:{flex:"1"}},h("div",{style:{fontWeight:"800",fontSize:"15px"}},p.name),h("div",{style:{fontSize:"11px",color:rl.c,fontWeight:"700"}},rl.t)),
          h("div",{style:{textAlign:"left"}},h("div",{style:{fontSize:"30px",fontWeight:"900",color:p.color,lineHeight:"1"}},total),h("div",{style:{fontSize:"9px",color:"rgba(255,255,255,0.22)",textAlign:"center"}},"نقطة"))
        ),
        rank>0?h("div",{style:{marginTop:"5px",fontSize:"10px",color:"rgba(255,255,255,0.27)"}},`يتأخر عن البطل بـ ${total-totalOf(byScore[0])} نقطة`):""
      ));
    });
  }

  if(tab==="history"){
    if(round===1){inner.appendChild(h("div",{style:{textAlign:"center",padding:"40px 0",color:"rgba(255,255,255,0.25)",fontSize:"13px"}},"لا توجد جولات بعد"));}
    else{
      const tw=h("div",{style:{overflowX:"auto",borderRadius:"10px",border:"1px solid rgba(255,255,255,0.07)"}});
      const tbl=h("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:"11px"}});
      const thead=h("thead",{}),hr=h("tr",{style:{background:"rgba(255,255,255,0.05)"}});
      hr.appendChild(h("th",{style:{padding:"8px 9px",color:"rgba(255,255,255,0.3)",fontWeight:"700"}},"ج"));
      players.forEach(p=>hr.appendChild(h("th",{style:{padding:"8px 9px",color:p.active?p.color:"rgba(255,255,255,0.22)",fontWeight:"800",whiteSpace:"nowrap"}},p.name+(p.active?"":" ⏸"))));
      thead.appendChild(hr);tbl.appendChild(thead);
      const tbody=h("tbody",{});
      for(let i=0;i<round-1;i++){
        const row=h("tr",{style:{borderTop:"1px solid rgba(255,255,255,0.04)",background:i%2?"rgba(255,255,255,0.015)":"transparent"}});
        row.appendChild(h("td",{style:{padding:"6px 9px",textAlign:"center",color:"rgba(255,255,255,0.3)",fontWeight:"700"}},i+1));
        players.forEach(p=>row.appendChild(h("td",{style:{padding:"6px 9px",textAlign:"center",fontWeight:"700",color:p.scores[i]===0?"#00E676":"#fff",opacity:p.joinedAtRound>i+1?"0.3":"1"}},p.scores[i]!==undefined?p.scores[i]:"—")));
        tbody.appendChild(row);
      }
      const sr=h("tr",{style:{borderTop:"2px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.03)"}});
      sr.appendChild(h("td",{style:{padding:"8px 9px",textAlign:"center",fontWeight:"800",color:"rgba(255,255,255,0.4)",fontSize:"10px"}},"∑"));
      players.forEach(p=>sr.appendChild(h("td",{style:{padding:"8px 9px",textAlign:"center",fontWeight:"900",fontSize:"14px",color:p.active?p.color:"rgba(255,255,255,0.25)"}},totalOf(p))));
      tbody.appendChild(sr);tbl.appendChild(tbody);tw.appendChild(tbl);inner.appendChild(tw);
    }
  }

  wrap.appendChild(inner);
  return wrap;
}

function doSave(){
  save({players:state.players,round:state.round});
  state.saveFlash=true;
  setTimeout(()=>{state.saveFlash=false;render();},1800);
}

// Boot
const saved=load();
if(saved?.players?.length>0)state.savedGame=saved;
render();
</script>
</body>
</html>
